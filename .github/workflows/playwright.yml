name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - feature/playwright-qa-automation
      browser:
        description: 'Browser to run tests on'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      spec:
        description: 'Test spec to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - tests/main-page.spec.ts
          - tests/login-invalid-credentials.spec.ts
          - tests/login-valid.spec.ts

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CMD="npx playwright test"
            [ "${{ github.event.inputs.browser }}" != "" ] && [ "${{ github.event.inputs.browser }}" != "all" ] && CMD="$CMD --project=${{ github.event.inputs.browser }}"
            [ "${{ github.event.inputs.spec }}" != "" ] && [ "${{ github.event.inputs.spec }}" != "all" ] && CMD="$CMD ${{ github.event.inputs.spec }}"
            eval $CMD
          else
            npm test
          fi
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'https://the-internet.herokuapp.com' }}
          LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME || 'tomsmith' }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD || 'SuperSecretPassword!' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
